<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J. Sons Bharat Traders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 20px 16px 40px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 12px; }
    .logo-circle {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #e94560, #f5a623);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 32px;
      box-shadow: 0 4px 20px rgba(233,69,96,0.4);
    }
    .title { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #a8c6fa; font-size: 14px; margin-bottom: 24px; }
    .buttons { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .btn {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 22px; border-radius: 16px; border: none;
      cursor: pointer; text-decoration: none; font-size: 17px;
      font-weight: 600; color: #fff; transition: transform 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3); width: 100%; text-align: left;
    }
    .btn:active { transform: scale(0.97); }
    .btn-icon { width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .btn-contact { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    .btn-whatsapp { background: linear-gradient(135deg, #075e54, #128c7e); }
    .btn-location { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .btn-items { background: linear-gradient(135deg, #6a3093, #a044ff); }
    .page { display: none; }
    .page.active { display: block; }
    .back-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; font-size: 15px; }
    .search-box {
      width: 100%; padding: 12px 16px; margin-bottom: 20px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; color: #fff; font-size: 15px;
    }
    .search-box::placeholder { color: rgba(255,255,255,0.5); }
    .item-list-container { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
    .item-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .item-list li {
      color: #1e1e1e; font-size: 16px; padding: 14px 18px;
      background: rgba(255,255,255,0.08); border-radius: 10px;
      border-left: 3px solid #a044ff;
    }
    .no-results { color: rgba(255,255,255,0.5); text-align: center; padding: 20px; font-size: 15px; }

        /* Light mode support for phones with light theme */
    @media (prefers-color-scheme: light) {
      body {
        background: #f5f5f5;
      }
      .title { color: #1a1a2e; }
      .subtitle { color: #4a5568; }
      .item-list-container { background: #ffffff; }
      .item-list li {
        color: #1a1a2e;
        background: #f9f9f9;
        border-left: 3px solid #a044ff;
      }
      .search-box {
        background: #ffffff;
        border: 1px solid #d1d5db;
        color: #1a1a2e;
      }
      .search-box::placeholder { color: #9ca3af; }
      .no-results { color: #6b7280; }
      .back-btn {
        background: #ffffff;
        border: 2px solid #d1d5db;
        color: #1a1a2e;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Main Page -->
    <div id="mainPage" class="page active">
      <div class="header">
        <div class="logo-circle">&#127968;</div>
        <h1 class="title">J. Sons Bharat Traders</h1>
        <p class="subtitle">Complete Interior and Exterior Solutions</p>
      </div>
      <div class="buttons">
        <button onclick="downloadContact()" class="btn btn-contact">          <div class="btn-icon">&#128100;</div>
          <div>Save Contact</div>
        </button>        <a href="https://wa.me/918955568624?text=Welcome" class="btn btn-whatsapp">
          <div class="btn-icon">&#128172;</div>
          <div>Chat with us on WhatsApp</div>
        </a>
        <a href="https://maps.app.goo.gl/fiZUEHiMK8YpGxZ7A" class="btn btn-location">
          <div class="btn-icon">&#128205;</div>
          <div>Open Location</div>
        </a>
        <button class="btn btn-items" onclick="showItemPage()">
          <div class="btn-icon">&#128203;</div>
          <div>View Item List</div>
        </button>
      </div>
    </div>

    <!-- Item List Page -->
    <div id="itemPage" class="page">
      <button class="back-btn" onclick="showMainPage()">&#8592; Back to Home</button>
      <h2 class="title" style="margin-bottom: 20px;">Product List</h2>
      <input type="text" class="search-box" id="searchInput" placeholder="&#128269; Search products..." oninput="filterItems()">
      <div class="item-list-container">
        <ul id="itemList" class="item-list"></ul>
        <p id="noResults" class="no-results" style="display:none;">No products found.</p>
      </div>
    </div>

  </div>

  <script>
    var items = [
      'Gypsum Board', 'Gypsum Tiles', 'POP', 'PVC Panels', 'WPC Louvers',
      'Fluted PVC Panels', 'Charcoal Louvers', 'UV Marble Sheet', 'Wallpaper',
      'PVC Flooring Sheet and Planks', 'Mold', 'Artificial Grass', 'Section Channel',
      'Bottom Channel', 'Cross Channel', 'L Angle', 'Parameter', 'Jali / Net',
      'Bond', 'Clip', 'Strip', 'Golden Profile', 'Fischer', 'Screw'
    ];

    function renderItems(list) {
      var ul = document.getElementById('itemList');
      var noResults = document.getElementById('noResults');
      ul.innerHTML = '';
      if (list.length === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
        list.forEach(function(item) {
          var li = document.createElement('li');
          li.textContent = item;
          ul.appendChild(li);
        });
      }
    }

    function filterItems() {
      var query = document.getElementById('searchInput').value.toLowerCase();
      var filtered = items.filter(function(item) {
        return item.toLowerCase().indexOf(query) !== -1;
      });
      renderItems(filtered);
    }

    function showItemPage() {
      document.getElementById('mainPage').classList.remove('active');
      document.getElementById('itemPage').classList.add('active');
      document.getElementById('searchInput').value = '';
      renderItems(items);
    }

    function showMainPage() {
      document.getElementById('itemPage').classList.remove('active');
      document.getElementById('mainPage').classList.add('active');
    }

        function downloadContact() {
      var vcfData = 'BEGIN:VCARD\n' +
        'VERSION:3.0\n' +
        'FN:Nazish Nadeem\n' +
        'N:Nadeem;Nazish;;;\n' +
        'ORG:J. Sons Bharat Traders\n' +
        'TEL;TYPE=CELL,VOICE:+918955568624\n' +
        'TEL;TYPE=CELL,VOICE:+917250677411\n' +
        'ADR;TYPE=WORK:;;Tikri Rd, near SD Hospitals;Aurangabad;Bihar;824101;India\n' +
        'EMAIL:jsonsbharattraders@gmail.com\n' +
        'END:VCARD';
      
      var blob = new Blob([vcfData], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = 'J-Sons-Bharat-Traders.vcf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
