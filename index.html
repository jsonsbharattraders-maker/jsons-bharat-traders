<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J. Sons Bharat Trader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 12px; }
        .logo-circle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #e94560, #f5a623);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px; font-size: 32px;
            box-shadow: 0 4px 20px rgba(233,69,96,0.4);
        }
        .title { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #a8c6fa; font-size: 14px; margin-bottom: 24px; }
        .buttons { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
        .btn {
            display: flex; align-items: center; gap: 16px;
            padding: 18px 22px; border-radius: 16px; border: none;
            cursor: pointer; text-decoration: none; font-size: 17px;
            font-weight: 600; color: #fff; transition: transform 0.15s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3); width: 100%; text-align: left;
        }
        .btn:active { transform: scale(0.97); }
        .btn-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .btn-contact { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        .btn-whatsapp { background: linear-gradient(135deg, #075e54, #128c7e); }
        .btn-location { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .btn-items { background: linear-gradient(135deg, #6a3093, #a044ff); }
        .btn-icon { background: rgba(255,255,255,0.15); }
        
        .page { display: none; }
        
        .back-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }
        
        .item-list-container { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
        .item-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .item-list li {
            color: #e0e0e0; font-size: 16px; padding: 14px 18px;
            background: rgba(255,255,255,0.08); border-radius: 10px;
            display: flex; align-items: center; justify-content: space-between;
            border-left: 3px solid #a044ff;
        }
        .item-name { flex-grow: 1; }
        .item-actions { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 16px; opacity: 0.6; transition: opacity 0.2s; }
        .action-btn:hover { opacity: 1; }
        .delete-btn:hover { color: #ff4d4d; }
        
        .add-item-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-item-form input {
            flex-grow: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 10px; color: #fff; font-size: 14px;
        }
        .add-btn { background: #a044ff; border: none; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Page -->
        <div id="mainPage" class="page" style="display: block;">
            <div class="header">
                <div class="logo-circle">🏠</div>
                <h1 class="title">J. Sons Bharat Trader</h1>
                <p class="subtitle">Welcome! Please choose an option below.</p>
            </div>
            <div class="buttons">
                <a href="nazish-nadeem.vcf" class="btn btn-contact">
                    <div class="btn-icon">👤</div>
                    <div class="btn-text">
                        <span class="btn-title">Save Contact</span>
                        <span class="btn-sub">Open in phone contacts</span>
                    </div>
                </a>
                <a href="https://wa.me/918955568624?text=Welcome" class="btn btn-whatsapp">
                    <div class="btn-icon">💬</div>
                    <div class="btn-text">
                        <span class="btn-title">Chat on WhatsApp</span>
                        <span class="btn-sub">Message us directly</span>
                    </div>
                </a>
                <a href="https://maps.app.goo.gl/fiZUEHiMK8YpGxZ7A" class="btn btn-location">
                    <div class="btn-icon">📍</div>
                    <div class="btn-text">
                        <span class="btn-title">Open Location</span>
                        <span class="btn-sub">View shop in Google Maps</span>
                    </div>
                </a>
                <button class="btn btn-items" onclick="showPage('itemPage')">
                    <div class="btn-icon">📋</div>
                    <div class="btn-text">
                        <span class="btn-title">View Item List</span>
                        <span class="btn-sub">See all products</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Item List Page -->
        <div id="itemPage" class="page" style="display: none;">
            <button class="back-btn" onclick="showPage('mainPage')">← Back to Home</button>
            <h2 class="title" style="margin-bottom: 20px;">Product List</h2>
            
            <div class="add-item-form">
                <input type="text" id="newItemInput" placeholder="Enter product name...">
                <button class="add-btn" onclick="addItem()">Add</button>
            </div>

            <div class="item-list-container">
                <ul id="itemList" class="item-list"></ul>
            </div>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('jsons_items')) || [
            'Gypsum Board', 'Gypsum Tiles', 'POP', 'PVC Panels', 'WPC Louvers', 
            'Fluted PVC Panels', 'Charcoal Louvers', 'UV Marble Sheet', 'Wallpaper', 
            'PVC Flooring Sheet and Planks', 'Mold', 'Artificial Grass', 'Section Channel', 
            'Bottom Channel', 'Cross Channel', 'L Angle', 'Parameter', 'Jali / Net', 
            'Bond', 'Clip', 'Strip', 'Golden Profile', 'Fischer', 'Screw'
        ];

        function renderItems() {
            const list = document.getElementById('itemList');
            if (!list) return;
            list.innerHTML = '';
            items.forEach((item, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="item-name">${item}</span>
                    <div class="item-actions">
                        <button class="action-btn" onclick="editItem(${index})">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteItem(${index})">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });
            localStorage.setItem('jsons_items', JSON.stringify(items));
        }

        function addItem() {
            const input = document.getElementById('newItemInput');
            if (input.value.trim()) {
                items.push(input.value.trim());
                input.value = '';
                renderItems();
            }
        }

        function editItem(index) {
            const newName = prompt('Edit product name:', items[index]);
            if (newName && newName.trim()) {
                items[index] = newName.trim();
                renderItems();
            }
        }

        function deleteItem(index) {
            if (confirm('Are you sure you want to delete this item?')) {
                items.splice(index, 1);
                renderItems();
            }
        }

        function showPage(pageId) {
            const mainPage = document.getElementById('mainPage');
            const itemPage = document.getElementById('itemPage');
            
            if (pageId === 'itemPage') {
                mainPage.style.display = 'none';
                itemPage.style.display = 'block';
                renderItems();
            } else {
                mainPage.style.display = 'block';
                itemPage.style.display = 'none';
            }
        }

        // Initial render
        renderItems();
    </script>
</body>
</html>
